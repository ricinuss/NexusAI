<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RicinusAI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%238b5cf6'/><circle cx='50' cy='38' r='16' fill='%23fff'/><path d='M24 75c0-15 12-26 26-26s26 11 26 26' fill='%23fff'/></svg>">

    <!-- CSS Modules -->
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/input.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/utils.css">
</head>
<body>

<!-- Overlays -->
<div class="s-overlay" id="sOverlay"></div>
<div class="drop-overlay" id="dropOverlay">
    <div class="drop-box">📎 Solte a imagem aqui</div>
</div>
<div class="lightbox" id="lightbox">
    <img id="lbImg" src="" alt="Preview">
</div>

<!-- Sidebar -->
<aside class="sidebar hide" id="sidebar">
    <div class="s-head">
        <div class="s-brand">
            <div class="s-brand-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a5 5 0 015 5v1a5 5 0 01-10 0V7a5 5 0 015-5z"/>
                    <path d="M19 21v-2a5 5 0 00-5-5h-4a5 5 0 00-5 5v2"/>
                </svg>
            </div>
            <span class="s-brand-text">RicinusAI</span>
        </div>
        <button class="btn-new" id="btnNew">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Novo Chat
        </button>
    </div>
    <div class="s-search">
        <svg class="s-search-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchChats" placeholder="Buscar chats...">
    </div>
    <div class="s-list" id="sList"></div>
    <div class="s-foot">
        <button class="s-foot-btn" id="btnImport">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Importar
        </button>
        <button class="s-foot-btn" id="btnExport">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Exportar
        </button>
        <button class="s-foot-btn" id="btnClear">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
            Limpar Tudo
        </button>
        <button class="s-foot-btn" id="btnOpenSet">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.73 12.73l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            Configurações
        </button>
    </div>
</aside>

<!-- Main Content -->
<main class="main">
    <header class="m-head">
        <div class="m-head-l">
            <button class="icon-btn" id="btnMenu">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="sel-wrap">
                <select id="selModel">
                    <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                    <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                    <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                    <option value="gemini-2.0-flash-lite">Gemini 2.0 Flash Lite</option>
                </select>
            </div>
        </div>
        <div class="m-head-r">
            <button class="icon-btn" id="btnScrollBottom" title="Ir para baixo" style="display:none">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <span class="badge off" id="badge">
                <span class="badge-dot"></span>
                <span id="badgeTxt">Sem chave</span>
            </span>
        </div>
    </header>

    <div class="chat-wrap" id="chatWrap">
        <div class="chat-msgs" id="chatMsgs"></div>
    </div>

    <div class="input-area">
        <div class="input-wrap">
            <div class="attach-preview" id="attachPreview" style="display:none"></div>
            <div class="input-box">
                <div class="input-attach">
                    <button class="btn-attach" id="btnAttach" title="Anexar imagem">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                    </button>
                    <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
                </div>
                <textarea id="inp" placeholder="Envie uma mensagem..." rows="1"></textarea>
                <button class="btn-send" id="btnSend" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
            <div class="input-foot">
                <span>RicinusAI pode cometer erros. Verifique informações.</span>
                <span class="char-count" id="charCount"></span>
            </div>
        </div>
    </div>
</main>

<!-- Settings Modal -->
<div class="modal-bg" id="setModal">
    <div class="modal">
        <div class="m-hd">
            <h2>Configurações</h2>
            <button class="m-cls" id="btnClsSet">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="m-body">
            <div class="sg">
                <label class="sg-label">Tema</label>
                <div class="theme-grid" id="themeGrid">
                    <div class="theme-opt" data-theme="dark"><span class="theme-dot" style="background:#8b5cf6"></span>Dark</div>
                    <div class="theme-opt" data-theme="midnight"><span class="theme-dot" style="background:#6366f1"></span>Midnight</div>
                    <div class="theme-opt" data-theme="forest"><span class="theme-dot" style="background:#34d399"></span>Forest</div>
                    <div class="theme-opt" data-theme="sunset"><span class="theme-dot" style="background:#f472b6"></span>Sunset</div>
                    <div class="theme-opt" data-theme="ocean"><span class="theme-dot" style="background:#38bdf8"></span>Ocean</div>
                    <div class="theme-opt" data-theme="lavender"><span class="theme-dot" style="background:#a78bfa"></span>Lavender</div>
                    <div class="theme-opt" data-theme="light"><span class="theme-dot" style="background:#7c3aed"></span>Light</div>
                </div>
            </div>
            <div class="sg">
                <label class="sg-label">Chaves API (até 10) — rotação automática</label>
                <p class="sg-desc">Obtenha em <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a></p>
                <div class="keys-list" id="keysList"></div>
                <button class="btn-add-key" id="btnAddKey">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Adicionar chave
                </button>
            </div>
            <div class="sg">
                <label class="sg-label">System Prompt</label>
                <textarea class="sg-input" id="sysInp" rows="3" placeholder="Ex: Você é um assistente prestativo..."></textarea>
            </div>
            <div class="sg">
                <label class="sg-label">Temperatura</label>
                <p class="sg-desc">0 = preciso, 2 = criativo</p>
                <div class="sg-row"><div class="sg-slider"><input type="range" class="sl-track" id="tempSl" min="0" max="2" step="0.1" value="1"></div><span class="sl-val" id="tempV">1.0</span></div>
            </div>
            <div class="sg">
                <label class="sg-label">Máximo de Tokens</label>
                <div class="sg-row"><div class="sg-slider"><input type="range" class="sl-track" id="tokSl" min="256" max="65536" step="256" value="8192"></div><span class="sl-val" id="tokV">8192</span></div>
            </div>
            <div class="sg">
                <label class="sg-label">Top P</label>
                <div class="sg-row"><div class="sg-slider"><input type="range" class="sl-track" id="topSl" min="0" max="1" step="0.05" value="0.95"></div><span class="sl-val" id="topV">0.95</span></div>
            </div>
            <div class="sg">
                <div class="sg-row">
                    <div><label class="sg-label">Chain of Thought</label><p class="sg-desc">Raciocínio interno da IA</p></div>
                    <label class="toggle"><input type="checkbox" id="thinkTog" checked><span></span></label>
                </div>
            </div>
            <div class="sg" id="thinkBudgetGrp">
                <label class="sg-label">Budget de Pensamento</label>
                <div class="sg-row"><div class="sg-slider"><input type="range" class="sl-track" id="thinkSl" min="1024" max="32768" step="1024" value="8192"></div><span class="sl-val" id="thinkV">8192</span></div>
            </div>
            <div class="sg">
                <div class="sg-row">
                    <div><label class="sg-label">Streaming</label><p class="sg-desc">Resposta em tempo real</p></div>
                    <label class="toggle"><input type="checkbox" id="streamTog" checked><span></span></label>
                </div>
            </div>
        </div>
        <div class="m-ft">
            <button class="m-btn m-btn-d" id="btnReset">Resetar</button>
            <button class="m-btn m-btn-s" id="btnCancel">Cancelar</button>
            <button class="m-btn m-btn-p" id="btnSave">Salvar</button>
        </div>
    </div>
</div>

<div class="toast-box" id="toasts"></div>

<!-- JS Modules -->
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/chat.js"></script>
<script src="js/render.js"></script>
<script src="js/send.js"></script>
<script src="js/ui.js"></script>
<script src="js/settings.js"></script>
<script src="js/files.js"></script>
<script src="js/app.js"></script>
</body>
</html>
